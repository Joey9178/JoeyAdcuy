    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", system-ui, sans-serif;
        }
        body {
            background: #050510;
            color: #fff;
            background-image: radial-gradient(circle at 20% 10%, #22006633 0%, transparent 45%),
            radial-gradient(circle at 80% 70%, #0088ff22 0%, transparent 50%);
            min-height: 100vh;
        }
        /* 霓虹流动头部 */
        .top-banner {
            position: relative;
            padding: 75px 20px;
            text-align: center;
            overflow: hidden;
        }
        .top-banner::before {
            content: "";
            position: absolute;
            inset: 0;
            background: linear-gradient(90deg,#f02fc2,#2980fe,#39ff14,#f02fc2);
            background-size: 300% 300%;
            animation: flowBg 6s linear infinite;
            opacity: 0.25;
            z-index: 0;
        }
        @keyframes flowBg {
            0% {background-position:0% 50%;}
            100% {background-position:300% 50%;}
        }
        .banner-inner {
            position: relative;
            z-index:2;
        }
        .avatar-box {
            width: 160px;
            height:160px;
            margin:0 auto 24px;
            border-radius:50%;
            padding:4px;
            background: linear-gradient(45deg,#ff2ec4,#00d0ff,#39ff14);
            animation: rotateBorder 3s linear infinite;
        }
        @keyframes rotateBorder {
            0% {filter:hue-rotate(0deg)}
            100% {filter:hue-rotate(360deg)}
        }
        .avatar-box img {
            width:100%;
            height:100%;
            border-radius:50%;
            object-fit:cover;
            display:block;
        }
        .name-title {
            font-size:38px;
            background: linear-gradient(90deg,#ff38c9,#22d3ff,#73ff68);

        .sub-desc {

            font-size:17px;
            color:#e9eeff;
            line-height:1.8;
            text-shadow:0 0 8px #00bfff44;
        }
        /* 发光导航 */
        .nav-bar {
            backdrop-filter: blur(12px);
            background:#ffffff0c;
            border-bottom:1px solid #ffffff22;
        }
        .nav-wrap {
            max-width:1100px;
            margin:0 auto;
            display:flex;
            justify-content:center;
            flex-wrap:wrap;
        }
        .nav-wrap a {
            padding:20px 30px;
            color:#d8e8ff;
            text-decoration:none;
            font-size:16px;
            transition:0.3s;
            position:relative;
        }
        .nav-wrap a:hover {
            color:#39ffd8;
            text-shadow:0 0 12px #39ffd8;
        }
        /* 主体布局 */
        .main-wrap {
            max-width:1100px;
            margin:50px auto;
            padding:0 20px;
            display:grid;
            grid-template-columns:67% 31%;
            gap:2%;
        }

            border-radius:16px;
            padding:34px;
            box-shadow:0 0 22px #00a2ff20, inset 0 0 20px #ff2ec20f;
            transition:0.35s ease;
        }

        }
